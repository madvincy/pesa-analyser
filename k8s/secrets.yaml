apiVersion: v1
kind: Secret
metadata:
  name: pesa-secrets
  namespace: pesa-analyser
type: Opaque
data:
  # Base64 encoded values
  SECRET_KEY: <base64-encoded-secret-key>
  JWT_SECRET: <base64-encoded-jwt-secret>
  GEMINI_API_KEY: <base64-encoded-gemini-key>
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-key>
  MPESA_CONSUMER_KEY: <base64-encoded-consumer-key>
  MPESA_CONSUMER_SECRET: <base64-encoded-consumer-secret>
  MPESA_PASSKEY: <base64-encoded-passkey>
  MPESA_SHORTCODE: <base64-encoded-shortcode>
  SMTP_USER: <base64-encoded-email>
  SMTP_PASSWORD: <base64-encoded-password>
