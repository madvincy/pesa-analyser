apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pesa-analyser
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: pesaregistry.azurecr.io/pesa-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: pesa-config
              key: DATABASE_URL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: pesa-config
              key: REDIS_HOST
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: pesa-config
              key: ENV
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: SECRET_KEY
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: JWT_SECRET
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: GEMINI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: ANTHROPIC_API_KEY
        - name: MPESA_CONSUMER_KEY
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: MPESA_CONSUMER_KEY
        - name: MPESA_CONSUMER_SECRET
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: MPESA_CONSUMER_SECRET
        - name: MPESA_PASSKEY
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: MPESA_PASSKEY
        - name: MPESA_SHORTCODE
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: MPESA_SHORTCODE
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: SMTP_USER
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pesa-secrets
              key: SMTP_PASSWORD
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: reports
          mountPath: /app/reports
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads-pvc
      - name: reports
        persistentVolumeClaim:
          claimName: reports-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: pesa-analyser
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: pesa-analyser
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: api.pesa-analyser.com
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
